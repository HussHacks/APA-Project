<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrackPro | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/frontend/style.css}" href="/frontend/style.css">
</head>
<body class="auth-page">
  <main class="page-shell">
    <section class="auth-card">
      <span class="brand-badge">Spring Security Login</span>
      <h1>FitTrackPro</h1>
      <p>Sign in with your email and password to open your role-based dashboard.</p>

      <div class="status-message show success" th:if="${param.registered}">Account created successfully. Please log in.</div>
      <div class="status-message show success" th:if="${param.logout}">You have been logged out successfully.</div>
      <div class="status-message show error" th:if="${param.error}">Invalid email or password.</div>

      <form class="form-grid" th:action="@{/login}" method="post">
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required>
        </div>
        <button class="button-primary" type="submit">Sign in</button>
      </form>

      <p class="auth-footer">Need an account? <a th:href="@{/register}">Create one here</a></p>
    </section>
  </main>
</body>
</html>
