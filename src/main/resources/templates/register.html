<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrackPro | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/frontend/style.css}" href="/frontend/style.css">
</head>
<body class="auth-page">
  <main class="page-shell">
    <section class="auth-card">
      <span class="brand-badge">Create Account</span>
      <h1>Join FitTrackPro</h1>
      <p>Register as a user and start tracking your meals, workouts, and activity history.</p>

      <div class="status-message show error" th:if="${registrationError}" th:text="${registrationError}"></div>

      <form class="form-grid" th:action="@{/register}" th:object="${registrationForm}" method="post">
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" type="text" th:field="*{username}" required>
          <span class="field-hint" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" type="email" th:field="*{email}" required>
          <span class="field-hint" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" type="password" th:field="*{password}" required>
          <span class="field-hint" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>
        <div class="field-group">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required>
          <span class="field-hint" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
        </div>
        <button class="button-primary" type="submit">Create account</button>
      </form>

      <p class="auth-footer">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </section>
  </main>
</body>
</html>
